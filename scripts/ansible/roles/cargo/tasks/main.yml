---
- name: Get installed Cargo packages
  shell: |
    . "$HOME/.cargo/env"
    cargo install --list
  args:
    executable: /bin/bash
  register: cargo_installed_packages
  changed_when: false
  failed_when: false

- name: Install Cargo packages
  shell: |
    . "$HOME/.cargo/env"
    cargo install {{ item.name }}
  args:
    executable: /bin/bash
  loop: "{{ cargo_packages }}"
  register: cargo_install_result
  when: >-
    (
      cargo_installed_packages.stdout_lines | default([])
    ) | select('match', '^' ~ item.name ~ ' v[^:]+:$') | list | length == 0

- name: Verify Cargo package installation
  shell: |
    . "$HOME/.cargo/env"
    {{ item.binary | default(item.name) }} --version
  args:
    executable: /bin/bash
  loop: "{{ cargo_packages }}"
  register: cargo_verify
  changed_when: false

- name: Show installed Cargo packages
  debug:
    msg: "Installed {{ item.item.name }}: {{ item.stdout_lines[0] | default('installed') }}"
  loop: "{{ cargo_verify.results }}"
