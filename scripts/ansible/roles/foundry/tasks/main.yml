---
- name: Manage Foundry installation
  when: foundry_enabled | bool
  block:
    - name: Install dependencies for Foundry
      become: true
      apt:
        name:
          - curl
          - git
          - build-essential
          - libssl-dev
          - pkg-config
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Check if foundryup is already installed
      stat:
        path: "{{ foundry_bin_dir }}/foundryup"
      register: foundryup_stat

    - name: Check current Foundry version
      command: "{{ foundry_bin_dir }}/forge --version"
      register: foundry_version_check
      failed_when: false
      changed_when: false

    - name: Decide whether Foundry needs bootstrap or update
      set_fact:
        foundry_needs_bootstrap: "{{ not foundryup_stat.stat.exists }}"
        foundry_needs_sync: "{{ foundry_version_check.rc != 0 or foundry_update | bool }}"

    - name: Download Foundry installer
      get_url:
        url: "https://foundry.paradigm.xyz"
        dest: "/tmp/foundry_install.sh"
        mode: '0755'
      when: foundry_needs_bootstrap

    - name: Run Foundry installer
      command: "/bin/bash /tmp/foundry_install.sh"
      args:
        creates: "{{ foundry_bin_dir }}/foundryup"
      when: foundry_needs_bootstrap

    - name: Remove Foundry installer
      file:
        path: "/tmp/foundry_install.sh"
        state: absent
      when: foundry_needs_bootstrap

    - name: Sync Foundry toolchain
      command: "{{ foundry_bin_dir }}/foundryup"
      register: foundryup_result
      when: foundry_needs_sync

    - name: Verify Foundry installation
      command: "{{ foundry_bin_dir }}/forge --version"
      register: foundry_version
      changed_when: false

    - name: Show installed Foundry version
      debug:
        msg: "Installed Foundry version: {{ foundry_version.stdout }}"
